<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>hydra editor</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:ital,wght@0,300;0,400;1,300&display=swap');

  :root {
    --bg: #080808;
    --panel: #0e0e0e;
    --border: rgba(255,255,255,.06);
    --accent: #c8ff47;
    --accent-dim: rgba(200,255,71,.15);
    --text: rgba(255,255,255,.55);
    --text-bright: rgba(255,255,255,.88);
    --danger: #ff4747;
    --panel-w: 300px;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100vw; height: 100vh; background: var(--bg); overflow: hidden; color: var(--text); font-family: 'JetBrains Mono', monospace; }

  /* ── LAYOUT ── */
  #app { display: flex; width: 100vw; height: 100vh; }

  /* ── CANVAS AREA ── */
  #canvas-wrap {
    flex: 1; position: relative; overflow: hidden;
    transition: all .3s;
  }
  #canvas-wrap canvas {
    position: absolute !important; top: 0 !important; left: 0 !important;
    width: 100% !important; height: 100% !important;
  }

  /* run indicator */
  #run-dot {
    position: absolute; top: 14px; left: 14px; z-index: 5;
    width: 6px; height: 6px; border-radius: 50%;
    background: var(--accent);
    box-shadow: 0 0 8px var(--accent);
    opacity: 0; transition: opacity .3s;
  }
  #run-dot.active { opacity: 1; animation: pulse 2s infinite; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.3} }

  /* error overlay */
  #error-bar {
    position: absolute; bottom: 0; left: 0; right: 0; z-index: 10;
    background: rgba(255,71,71,.12); border-top: 1px solid rgba(255,71,71,.3);
    padding: 8px 14px; font-size: 10px; letter-spacing: .05em;
    color: var(--danger); display: none;
    font-family: 'JetBrains Mono', monospace;
  }

  /* fullscreen btn */
  #btn-fs {
    position: absolute; top: 12px; right: 12px; z-index: 5;
    background: rgba(0,0,0,.5); border: 1px solid var(--border);
    color: var(--text); font-size: 10px; letter-spacing: .15em;
    padding: 6px 10px; cursor: pointer; font-family: 'JetBrains Mono', monospace;
    text-transform: uppercase; transition: all .2s;
  }
  #btn-fs:hover { color: var(--accent); border-color: var(--accent-dim); }

  /* ── SIDE PANEL ── */
  #panel {
    width: var(--panel-w); background: var(--panel);
    border-left: 1px solid var(--border);
    display: flex; flex-direction: column;
    transition: transform .3s;
  }
  #panel.hidden { transform: translateX(var(--panel-w)); }

  /* panel header */
  #panel-header {
    padding: 16px 18px 12px;
    border-bottom: 1px solid var(--border);
    display: flex; align-items: center; justify-content: space-between;
  }
  .panel-title {
    font-size: 9px; letter-spacing: .35em; text-transform: uppercase;
    color: rgba(255,255,255,.2);
  }
  #audio-indicator {
    font-size: 8px; letter-spacing: .15em; text-transform: uppercase;
    color: rgba(255,255,255,.15); display: flex; align-items: center; gap: 6px;
  }
  #audio-dot {
    width: 5px; height: 5px; border-radius: 50%;
    background: rgba(255,255,255,.15); transition: all .3s;
  }
  #audio-dot.on { background: var(--accent); box-shadow: 0 0 6px var(--accent); }

  /* editor */
  #editor-wrap {
    flex: 1; position: relative; overflow: hidden;
  }
  #editor {
    width: 100%; height: 100%;
    background: transparent; border: none; outline: none; resize: none;
    color: var(--text-bright); font-family: 'JetBrains Mono', monospace;
    font-size: 12px; line-height: 1.7; padding: 16px 18px;
    caret-color: var(--accent);
  }
  #editor::selection { background: var(--accent-dim); }
  #line-count {
    position: absolute; top: 16px; right: 0; width: 30px;
    font-size: 10px; line-height: 1.7; padding-top: 0;
    color: rgba(255,255,255,.1); text-align: right;
    pointer-events: none; user-select: none;
    padding-right: 6px;
  }

  /* actions */
  #actions {
    padding: 12px 18px; border-top: 1px solid var(--border);
    display: flex; gap: 8px;
  }
  .btn-run {
    flex: 1; background: var(--accent); border: none;
    color: #000; font-family: 'JetBrains Mono', monospace;
    font-size: 10px; letter-spacing: .2em; text-transform: uppercase;
    padding: 10px; cursor: pointer; transition: all .15s;
    font-weight: 400;
  }
  .btn-run:hover { filter: brightness(1.1); }
  .btn-run:active { transform: scale(.98); }
  .btn-icon {
    background: rgba(255,255,255,.04); border: 1px solid var(--border);
    color: var(--text); font-family: 'JetBrains Mono', monospace;
    font-size: 11px; padding: 10px 13px; cursor: pointer; transition: all .2s;
  }
  .btn-icon:hover { color: var(--accent); border-color: var(--accent-dim); }

  /* shortcut hint */
  #hint {
    padding: 0 18px 10px;
    font-size: 8px; letter-spacing: .15em; color: rgba(255,255,255,.1);
    text-transform: uppercase;
  }

  /* ── PRESETS ── */
  #presets-section {
    border-top: 1px solid var(--border);
    display: flex; flex-direction: column; max-height: 220px;
  }
  #presets-header {
    padding: 10px 18px 8px;
    display: flex; align-items: center; justify-content: space-between;
  }
  .section-label {
    font-size: 8px; letter-spacing: .3em; text-transform: uppercase;
    color: rgba(255,255,255,.18);
  }
  #btn-save-preset {
    font-size: 8px; letter-spacing: .15em; text-transform: uppercase;
    background: none; border: 1px solid var(--border);
    color: rgba(255,255,255,.2); padding: 4px 9px; cursor: pointer;
    font-family: 'JetBrains Mono', monospace; transition: all .2s;
  }
  #btn-save-preset:hover { color: var(--accent); border-color: var(--accent-dim); }

  #presets-list {
    overflow-y: auto; padding: 0 18px 12px; flex: 1;
    scrollbar-width: thin; scrollbar-color: var(--border) transparent;
  }
  .preset-item {
    display: flex; align-items: center; gap: 0;
    border: 1px solid var(--border); margin-bottom: 5px;
    transition: border-color .2s;
  }
  .preset-item:hover { border-color: rgba(255,255,255,.12); }
  .preset-load {
    flex: 1; background: none; border: none; text-align: left;
    color: var(--text); font-family: 'JetBrains Mono', monospace;
    font-size: 10px; padding: 8px 10px; cursor: pointer; transition: color .2s;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .preset-load:hover { color: var(--text-bright); }
  .preset-del {
    background: none; border: none; border-left: 1px solid var(--border);
    color: rgba(255,255,255,.15); font-size: 11px;
    padding: 8px 10px; cursor: pointer; transition: color .2s;
  }
  .preset-del:hover { color: var(--danger); }

  /* audio section */
  #audio-section {
    border-top: 1px solid var(--border);
    padding: 10px 18px 12px;
  }
  .audio-row {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 8px;
  }
  #btn-audio {
    font-size: 8px; letter-spacing: .15em; text-transform: uppercase;
    background: none; border: 1px solid var(--border);
    color: rgba(255,255,255,.2); padding: 5px 10px; cursor: pointer;
    font-family: 'JetBrains Mono', monospace; transition: all .2s; width: 100%;
  }
  #btn-audio:hover, #btn-audio.on { color: var(--accent); border-color: var(--accent-dim); }
  #btn-audio.on { background: var(--accent-dim); }

  .audio-hint {
    font-size: 8px; letter-spacing: .08em; color: rgba(255,255,255,.12);
    line-height: 1.6; margin-top: 6px;
  }

  /* ── TOGGLE PANEL BTN ── */
  #btn-toggle-panel {
    position: absolute; top: 50%; right: 0; transform: translateY(-50%);
    z-index: 20; background: var(--panel);
    border: 1px solid var(--border); border-right: none;
    color: var(--text); font-size: 10px; padding: 10px 6px;
    cursor: pointer; writing-mode: vertical-rl;
    font-family: 'JetBrains Mono', monospace;
    letter-spacing: .15em; text-transform: uppercase;
    transition: all .2s;
  }
  #btn-toggle-panel:hover { color: var(--accent); }

  /* ── MODAL PRESET NAME ── */
  #modal-overlay {
    position: fixed; inset: 0; z-index: 100;
    background: rgba(0,0,0,.7); display: none;
    align-items: center; justify-content: center;
  }
  #modal-overlay.show { display: flex; }
  #modal {
    background: var(--panel); border: 1px solid var(--border);
    padding: 28px 32px; min-width: 280px;
  }
  #modal h3 {
    font-size: 9px; letter-spacing: .3em; text-transform: uppercase;
    color: rgba(255,255,255,.3); margin-bottom: 16px;
  }
  #preset-name-input {
    width: 100%; background: rgba(255,255,255,.04);
    border: 1px solid var(--border); color: var(--text-bright);
    font-family: 'JetBrains Mono', monospace; font-size: 12px;
    padding: 10px 12px; outline: none; caret-color: var(--accent);
    margin-bottom: 14px;
  }
  #preset-name-input:focus { border-color: var(--accent-dim); }
  .modal-actions { display: flex; gap: 8px; }
  .modal-btn {
    flex: 1; padding: 9px; font-family: 'JetBrains Mono', monospace;
    font-size: 9px; letter-spacing: .2em; text-transform: uppercase;
    cursor: pointer; border: 1px solid var(--border);
    background: none; color: var(--text); transition: all .2s;
  }
  .modal-btn.primary { background: var(--accent); color: #000; border-color: var(--accent); }
  .modal-btn:hover { opacity: .8; }
</style>
</head>
<body>

<div id="app">
  <!-- canvas -->
  <div id="canvas-wrap">
    <div id="run-dot"></div>
    <button id="btn-fs" title="pantalla completa">⛶ fullscreen</button>
    <div id="error-bar"></div>
    <button id="btn-toggle-panel">panel</button>
  </div>

  <!-- panel -->
  <div id="panel">
    <div id="panel-header">
      <span class="panel-title">hydra editor</span>
      <div id="audio-indicator">
        <div id="audio-dot"></div>
        <span id="audio-label">sin audio</span>
      </div>
    </div>

    <div id="editor-wrap">
      <textarea id="editor" spellcheck="false" autocomplete="off" autocorrect="off" autocapitalize="off">// ejemplo — editá y ejecutá con Ctrl+Enter
osc(6, 0.05, 1.4)
  .rotate(0.3)
  .modulateScale(noise(3), 0.3)
  .color(1.1, 0.8, 1.3)
  .out()</textarea>
      <div id="line-count"></div>
    </div>

    <div id="hint">ctrl+enter — ejecutar</div>

    <div id="actions">
      <button class="btn-run" id="btn-run">▶ ejecutar</button>
      <button class="btn-icon" id="btn-clear" title="limpiar">✕</button>
    </div>

    <div id="audio-section">
      <button id="btn-audio">♪ activar audio reactivo</button>
      <div class="audio-hint">
        usá <code>a.fft[0]</code> — <code>a.fft[1]</code> etc.<br>
        en tu código para reactividad de audio
      </div>
    </div>

    <div id="presets-section">
      <div id="presets-header">
        <span class="section-label">presets</span>
        <button id="btn-save-preset">+ guardar</button>
      </div>
      <div id="presets-list"></div>
    </div>
  </div>
</div>

<!-- modal nombre preset -->
<div id="modal-overlay">
  <div id="modal">
    <h3>nombre del preset</h3>
    <input id="preset-name-input" type="text" placeholder="mi efecto..." maxlength="40">
    <div class="modal-actions">
      <button class="modal-btn" id="modal-cancel">cancelar</button>
      <button class="modal-btn primary" id="modal-confirm">guardar</button>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/hydra-synth/dist/hydra-synth.js"></script>
<script>
'use strict';

// ── HYDRA INIT ────────────────────────────────────────────────────────────────
const canvasWrap = document.getElementById('canvas-wrap');

const hydra = new Hydra({
  detectAudio: false,
  makeGlobal: true,
  width:  window.innerWidth - 300,
  height: window.innerHeight,
});

// mover canvas de hydra al wrap
const hCanvas = document.querySelector('canvas');
canvasWrap.prepend(hCanvas);

// default visual
try {
  osc(6, 0.05, 1.4).rotate(0.3).modulateScale(noise(3), 0.3).color(1.1, 0.8, 1.3).out();
} catch(e){}

// ── EDITOR ────────────────────────────────────────────────────────────────────
const editor    = document.getElementById('editor');
const errorBar  = document.getElementById('error-bar');
const runDot    = document.getElementById('run-dot');
const lineCount = document.getElementById('line-count');

function updateLineCount(){
  const lines = editor.value.split('\n').length;
  lineCount.textContent = Array.from({length: lines}, (_,i) => i+1).join('\n');
}
editor.addEventListener('input', updateLineCount);
updateLineCount();

// tab key
editor.addEventListener('keydown', e => {
  if(e.key === 'Tab'){
    e.preventDefault();
    const s = editor.selectionStart;
    editor.value = editor.value.slice(0, s) + '  ' + editor.value.slice(editor.selectionEnd);
    editor.selectionStart = editor.selectionEnd = s + 2;
    updateLineCount();
  }
  if((e.ctrlKey || e.metaKey) && e.key === 'Enter'){
    e.preventDefault();
    runCode();
  }
});

function runCode(){
  const code = editor.value.trim();
  if(!code) return;
  errorBar.style.display = 'none';
  try {
    // reset outputs
    solid(0,0,0,1).out(o0);
    solid(0,0,0,1).out(o1);
    solid(0,0,0,1).out(o2);
    solid(0,0,0,1).out(o3);
    // eslint-disable-next-line no-new-func
    new Function(code)();
    runDot.classList.add('active');
  } catch(err){
    errorBar.style.display = 'block';
    errorBar.textContent = '⚠ ' + err.message;
    runDot.classList.remove('active');
  }
}

document.getElementById('btn-run').addEventListener('click', runCode);

document.getElementById('btn-clear').addEventListener('click', () => {
  editor.value = '';
  updateLineCount();
  errorBar.style.display = 'none';
  runDot.classList.remove('active');
  solid(0,0,0,1).out();
});

// ── AUDIO REACTIVO ────────────────────────────────────────────────────────────
let audioOn = false;
const btnAudio   = document.getElementById('btn-audio');
const audioDot   = document.getElementById('audio-dot');
const audioLabel = document.getElementById('audio-label');

btnAudio.addEventListener('click', async () => {
  if(!audioOn){
    try {
      await a.setSmooth(0.8);
      audioOn = true;
      btnAudio.textContent = '♪ audio activo';
      btnAudio.classList.add('on');
      audioDot.classList.add('on');
      audioLabel.textContent = 'audio on';
    } catch(e){
      errorBar.style.display = 'block';
      errorBar.textContent = '⚠ No se pudo acceder al micrófono';
      errorBar.style.display = 'block';
    }
  } else {
    audioOn = false;
    btnAudio.textContent = '♪ activar audio reactivo';
    btnAudio.classList.remove('on');
    audioDot.classList.remove('on');
    audioLabel.textContent = 'sin audio';
  }
});

// ── PRESETS ───────────────────────────────────────────────────────────────────
let presets = JSON.parse(localStorage.getItem('hydra-presets') || '[]');

// presets de ejemplo
if(presets.length === 0){
  presets = [
    { name: 'osc básico', code: "osc(6, 0.05, 1.4)\n  .rotate(0.3)\n  .modulateScale(noise(3), 0.3)\n  .color(1.1, 0.8, 1.3)\n  .out()" },
    { name: 'noise fluido', code: "noise(3, 0.2)\n  .mult(gradient(1))\n  .modulate(noise(2), 0.08)\n  .out()" },
    { name: 'voronoi glitch', code: "voronoi(5, 0.3, 0.3)\n  .color(0.8, 1.2, 1)\n  .modulate(osc(4, 0.1), 0.04)\n  .out()" },
  ];
  savePresets();
}

function savePresets(){
  localStorage.setItem('hydra-presets', JSON.stringify(presets));
  renderPresets();
}

function renderPresets(){
  const list = document.getElementById('presets-list');
  list.innerHTML = '';
  presets.forEach((p, i) => {
    const item = document.createElement('div');
    item.className = 'preset-item';
    item.innerHTML = `
      <button class="preset-load">${p.name}</button>
      <button class="preset-del" title="eliminar">✕</button>
    `;
    item.querySelector('.preset-load').addEventListener('click', () => {
      editor.value = p.code;
      updateLineCount();
      runCode();
    });
    item.querySelector('.preset-del').addEventListener('click', () => {
      presets.splice(i, 1);
      savePresets();
    });
    list.appendChild(item);
  });
}
renderPresets();

// modal guardar preset
const modal      = document.getElementById('modal-overlay');
const nameInput  = document.getElementById('preset-name-input');

document.getElementById('btn-save-preset').addEventListener('click', () => {
  nameInput.value = '';
  modal.classList.add('show');
  setTimeout(() => nameInput.focus(), 50);
});
document.getElementById('modal-cancel').addEventListener('click', () => modal.classList.remove('show'));
document.getElementById('modal-confirm').addEventListener('click', confirmSave);
nameInput.addEventListener('keydown', e => { if(e.key === 'Enter') confirmSave(); if(e.key === 'Escape') modal.classList.remove('show'); });

function confirmSave(){
  const name = nameInput.value.trim();
  if(!name) return;
  presets.push({ name, code: editor.value });
  savePresets();
  modal.classList.remove('show');
}

// ── FULLSCREEN ────────────────────────────────────────────────────────────────
const panel   = document.getElementById('panel');
const btnFS   = document.getElementById('btn-fs');
let   isFS    = false;

btnFS.addEventListener('click', () => {
  isFS = !isFS;
  panel.classList.toggle('hidden', isFS);
  document.getElementById('btn-toggle-panel').style.display = isFS ? 'none' : '';
  btnFS.textContent = isFS ? '⛶ salir' : '⛶ fullscreen';
  setTimeout(() => hydra.setResolution(
    canvasWrap.offsetWidth,
    canvasWrap.offsetHeight
  ), 350);
});

// ── TOGGLE PANEL ─────────────────────────────────────────────────────────────
document.getElementById('btn-toggle-panel').addEventListener('click', () => {
  panel.classList.toggle('hidden');
  setTimeout(() => hydra.setResolution(canvasWrap.offsetWidth, canvasWrap.offsetHeight), 350);
});

// ── RESIZE ────────────────────────────────────────────────────────────────────
window.addEventListener('resize', () => {
  hydra.setResolution(canvasWrap.offsetWidth, canvasWrap.offsetHeight);
});
</script>
</body>
</html>
